# =============================================================
# Multi-SIEM Detection Rule Orchestrator
# =============================================================
# Automatically validates, converts, and deploys Sigma rules
# across multiple SIEM platforms when rules are pushed.
#
# OPSEC: All credentials stored in GitHub Secrets.
# Required Secrets:
#   - SPLUNK_URL          : Splunk instance base URL
#   - SPLUNK_API_TOKEN    : Splunk Bearer token
#   - ELASTIC_URL         : Elasticsearch/Kibana base URL
#   - ELASTIC_API_KEY     : Elasticsearch API key
#   - SLACK_WEBHOOK_URL   : (Optional) Slack notification webhook
# =============================================================

name: "🛡️ Sigma Rule Orchestrator — Multi-SIEM Deploy"

on:
  push:
    paths:
      - "rules/**"
      - "config/**"
    branches:
      - main
      - master
  pull_request:
    paths:
      - "rules/**"
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      force_deploy:
        description: "Force deploy all rules (skip change detection)"
        required: false
        default: "false"
        type: boolean
      target_platform:
        description: "Deploy to specific platform (all, splunk, elasticsearch)"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - splunk
          - elasticsearch

# Prevent concurrent deployments
concurrency:
  group: sigma-deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write

env:
  PYTHON_VERSION: "3.11"
  RULES_DIR: "rules"
  OUTPUT_DIR: "output"
  CONFIG_PATH: "config/siem_config.yml"

jobs:
  # =========================================================
  # Job 1: Validate all Sigma rules
  # =========================================================
  validate:
    name: "🔍 Validate Sigma Rules"
    runs-on: ubuntu-latest

    outputs:
      deployable_count: ${{ steps.validate.outputs.deployable_count }}
      total_rules: ${{ steps.validate.outputs.total_rules }}
      validation_errors: ${{ steps.validate.outputs.validation_errors }}

    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "🐍 Setup Python ${{ env.PYTHON_VERSION }}"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: "📦 Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: "🔍 Validate Sigma rules"
        id: validate
        run: |
          python scripts/validate_rules.py ${{ env.RULES_DIR }}

      - name: "📊 Upload validation results"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-results
          path: deployable_rules.json
          retention-days: 30

      - name: "💬 Comment on PR (if applicable)"
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const deployable = '${{ steps.validate.outputs.deployable_count }}';
            const total = '${{ steps.validate.outputs.total_rules }}';
            const errors = '${{ steps.validate.outputs.validation_errors }}';
            
            const status = errors === '0' ? '✅' : '❌';
            const body = `## ${status} Sigma Rule Validation Report
            
            | Metric | Value |
            |--------|-------|
            | Total Rules | ${total} |
            | Deployable | ${deployable} |
            | Errors | ${errors} |
            
            ${errors > 0 ? '⚠️ Fix validation errors before merging.' : '🚀 All rules are valid and ready for deployment.'}
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  # =========================================================
  # Job 2: Convert rules to SIEM-native formats
  # =========================================================
  convert:
    name: "🔄 Convert to SIEM Formats"
    runs-on: ubuntu-latest
    needs: validate
    if: needs.validate.outputs.validation_errors == '0'

    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      - name: "🐍 Setup Python ${{ env.PYTHON_VERSION }}"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: "📦 Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: "📥 Download validation artifacts"
        uses: actions/download-artifact@v4
        with:
          name: validation-results
          path: .

      - name: "🔄 Convert rules to Splunk SPL"
        run: |
          echo "Converting to Splunk format..."
          python scripts/convert_rules.py ${{ env.RULES_DIR }} ${{ env.OUTPUT_DIR }} ${{ env.CONFIG_PATH }}

      - name: "📊 List converted rules"
        run: |
          echo "=== Splunk Rules ==="
          ls -la ${{ env.OUTPUT_DIR }}/splunk/ 2>/dev/null || echo "No Splunk rules"
          echo ""
          echo "=== Elasticsearch Rules ==="
          ls -la ${{ env.OUTPUT_DIR }}/elasticsearch/ 2>/dev/null || echo "No Elasticsearch rules"

      - name: "📤 Upload converted rules"
        uses: actions/upload-artifact@v4
        with:
          name: converted-rules
          path: ${{ env.OUTPUT_DIR }}/
          retention-days: 30

  # =========================================================
  # Job 3: Deploy to Splunk
  # =========================================================
  deploy-splunk:
    name: "🔷 Deploy to Splunk"
    runs-on: ubuntu-latest
    needs: convert
    if: |
      github.event_name != 'pull_request' &&
      (github.event.inputs.target_platform == 'all' || 
       github.event.inputs.target_platform == 'splunk' ||
       github.event.inputs.target_platform == '')
    environment: production

    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      - name: "🐍 Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: "📦 Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: "📥 Download converted rules"
        uses: actions/download-artifact@v4
        with:
          name: converted-rules
          path: ${{ env.OUTPUT_DIR }}

      - name: "🔷 Deploy to Splunk"
        env:
          SPLUNK_URL: ${{ secrets.SPLUNK_URL }}
          SPLUNK_API_TOKEN: ${{ secrets.SPLUNK_API_TOKEN }}
          SPLUNK_VERIFY_SSL: "true"
        run: |
          python scripts/deploy_siem.py ${{ env.OUTPUT_DIR }} ${{ env.CONFIG_PATH }}

      - name: "📤 Upload deployment report"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: splunk-deployment-report
          path: ${{ env.OUTPUT_DIR }}/deployment_report.json
          retention-days: 90

  # =========================================================
  # Job 4: Deploy to Elasticsearch
  # =========================================================
  deploy-elasticsearch:
    name: "🟡 Deploy to Elasticsearch"
    runs-on: ubuntu-latest
    needs: convert
    if: |
      github.event_name != 'pull_request' &&
      (github.event.inputs.target_platform == 'all' || 
       github.event.inputs.target_platform == 'elasticsearch' ||
       github.event.inputs.target_platform == '')
    environment: production

    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      - name: "🐍 Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: "📦 Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: "📥 Download converted rules"
        uses: actions/download-artifact@v4
        with:
          name: converted-rules
          path: ${{ env.OUTPUT_DIR }}

      - name: "🟡 Deploy to Elasticsearch"
        env:
          ELASTIC_URL: ${{ secrets.ELASTIC_URL }}
          ELASTIC_API_KEY: ${{ secrets.ELASTIC_API_KEY }}
          ELASTIC_VERIFY_SSL: "true"
        run: |
          python scripts/deploy_siem.py ${{ env.OUTPUT_DIR }} ${{ env.CONFIG_PATH }}

      - name: "📤 Upload deployment report"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: elastic-deployment-report
          path: ${{ env.OUTPUT_DIR }}/deployment_report.json
          retention-days: 90

  # =========================================================
  # Job 5: Post-deployment notification
  # =========================================================
  notify:
    name: "📢 Notification"
    runs-on: ubuntu-latest
    needs: [validate, convert, deploy-splunk, deploy-elasticsearch]
    if: always() && github.event_name != 'pull_request'

    steps:
      - name: "📢 Send Slack notification"
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          VALIDATE_STATUS="${{ needs.validate.result }}"
          CONVERT_STATUS="${{ needs.convert.result }}"
          SPLUNK_STATUS="${{ needs.deploy-splunk.result }}"
          ELASTIC_STATUS="${{ needs.deploy-elasticsearch.result }}"
          
          if [ "$VALIDATE_STATUS" == "success" ] && [ "$CONVERT_STATUS" == "success" ]; then
            COLOR="#36a64f"
            TITLE="✅ Sigma Rules Deployed Successfully"
          else
            COLOR="#ff0000"
            TITLE="❌ Sigma Rule Deployment Failed"
          fi
          
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"attachments\": [{
                \"color\": \"${COLOR}\",
                \"title\": \"${TITLE}\",
                \"fields\": [
                  {\"title\": \"Validation\", \"value\": \"${VALIDATE_STATUS}\", \"short\": true},
                  {\"title\": \"Conversion\", \"value\": \"${CONVERT_STATUS}\", \"short\": true},
                  {\"title\": \"Splunk\", \"value\": \"${SPLUNK_STATUS}\", \"short\": true},
                  {\"title\": \"Elasticsearch\", \"value\": \"${ELASTIC_STATUS}\", \"short\": true},
                  {\"title\": \"Branch\", \"value\": \"${GITHUB_REF_NAME}\", \"short\": true},
                  {\"title\": \"Commit\", \"value\": \"${GITHUB_SHA::7}\", \"short\": true}
                ],
                \"footer\": \"Sigma Rule Orchestrator\",
                \"ts\": $(date +%s)
              }]
            }"

      - name: "📊 Summary"
        run: |
          echo "## 🛡️ Sigma Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Validation | ${{ needs.validate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Conversion | ${{ needs.convert.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Splunk Deploy | ${{ needs.deploy-splunk.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Elasticsearch Deploy | ${{ needs.deploy-elasticsearch.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Total Rules:** ${{ needs.validate.outputs.total_rules }}" >> $GITHUB_STEP_SUMMARY
          echo "**Deployable:** ${{ needs.validate.outputs.deployable_count }}" >> $GITHUB_STEP_SUMMARY
