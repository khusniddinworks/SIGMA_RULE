title: Suspicious Scheduled Task Created via Command Line
id: e5f6a7b8-c9d0-1234-ef56-789012345678
status: experimental
description: Detects creation of scheduled tasks via schtasks.exe, which can be used by attackers for persistence and privilege escalation.
author: CyberBrother
date: 2026-03-19
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\schtasks.exe'
        CommandLine|contains: '/create'
    filter_system:
        User|contains:
            - 'SYSTEM'
            - 'LOCAL SERVICE'
    condition: selection and not filter_system
falsepositives:
    - Legitimate task scheduling by administrators
    - Software installation processes
level: medium
tags:
    - attack.persistence
    - attack.execution
    - attack.t1053.005
