title: Suspicious PowerShell Command Execution
id: 7b2e0c1a-4d3f-4a5b-8c9e-1f2a3b4c5d6e
status: experimental
description: Detects suspicious PowerShell commands commonly used by attackers, such as encoded commands, download cradles, and execution policy bypasses.
author: CyberBrother
date: 2026-03-19
logsource:
    category: process_creation
    product: windows
detection:
    selection_img:
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
    selection_cli:
        CommandLine|contains:
            - '-encodedcommand'
            - '-enc '
            - 'IEX'
            - 'Invoke-Expression'
            - 'Invoke-WebRequest'
            - 'DownloadString'
            - 'DownloadFile'
            - 'Net.WebClient'
            - '-ExecutionPolicy Bypass'
            - 'hidden'
            - 'FromBase64String'
            - 'System.Reflection.Assembly'
    condition: selection_img and selection_cli
falsepositives:
    - Legitimate system administration scripts
    - Software deployment tools
level: high
tags:
    - attack.execution
    - attack.t1059.001
